<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
    <title>Traffic Light Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
        }

        #game-container {
            position: relative;
            width: 500px;
            height: 330px;
            border: 2px solid #333;
            overflow: hidden;
            margin-top: 20px;
            display: none;
            /* Start hidden */
        }

        #car {
            position: absolute;
            bottom: 20px;
            right: 1px;
            width: 150px;
            height: auto;
        }

        #traffic-light {
            position: absolute;
            top: 40px;
            left: 170px;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            margin-right: 20px;
            /* Space between traffic light and timer */
        }

        .green {
            background-color: green;
        }

        .red {
            background-color: red;
        }

        #controls {
            margin-top: 20px;
            display: none;
            /* Start hidden */
        }

        #timer {
            font-size: 20px;
            margin-top: 10px;
            font-weight: bold;
            display: none;
            /* Start hidden */
        }

        .button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: green;
            color: white;
            font-size: larger;
        }

        .button2 {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: rgb(128, 0, 4);
            color: white;
            font-size: larger;

        }

        button.button:hover {
            background-color: darkgreen;
        }

        button.button2:hover {
            background-color: darkred;
        }

        #description1,
        #description2,
        #description3 {
            font-size: 16px;
            margin: 10px 0;
            text-align: center;
            display: none;
            /* Initially hidden */
        }

        .highlight-go {
            font-size: 24px;
            font-weight: bold;
            color: green;
        }

        .highlight-stop {
            font-size: 24px;
            font-weight: bold;
            color: rgb(128, 0, 4);
        }

        .bold {
            font-size: 50px;
            font-weight: bold;
        }

        #summary {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        #feedback {
            font-size: 18px;
            margin-top: 10px;
            color: #333;
        }

        #startScreen {
            text-align: center;
        }

        .containersecond {
            text-align: center;
            width: 280px;
            height: 160px;
            justify-self: right;
            align-content: center;
        }

        #road {
            position: absolute;
            bottom: -30px;
            right: 1px;
            width: 100%;
            height: auto;
        }

        p {
            margin: 0;
            /* Remove default margin */
            line-height: 1.5;
            /* Adjust line height for spacing */
        }

        .start-button {
            display: flex;
            text-align: center;
            padding: 15px 30px;
            font-size: 20px;
            color: #262626;
            border-color: #595959;
            background-color: #ffffff;
            cursor: pointer;
            justify-self: center;
            border-radius: 50px;
            box-shadow: none;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);            
        }
    </style>
</head>

<body>


    <div id="startScreen">
        <h1 id="title">Lab Rules</h1><br>
        <img id="rule" src="Lab 3-rule.png" alt="Game Rule (Lab 3) Image" width="auto" height="300"></img>
        <br><br>
        <button id="startGameButton" class="start-button" onclick="startGame()">Let's Play!</button>
    </div>

    <p id="rule1" style="display: none;">When traffic signal shows <b style="color: red;">'Go'</b>, click <b
            style="color: green;">'Start'</b>.</p>
    <p id="rule2" style="display: none;">When traffic signal shows <b style="color: green;">'Stop'</b>, click <b
            style="color: red;">'Brake'</b>.</p>

    <div id="game-container">
        <div id="traffic-light" class="green">GO</div>
        <p>Rounds:<b><span id="roundno" style="font-weight: bold; ">1</span> / 10</b></p>
        <div id="abc" class="containersecond">
            <div class="timer">This signal will remain:</div>
            <span id="countdown" class="bold">2</span> second(s)
        </div>
        <img id="road" src="Lab 3-road.png" alt="Road Image"></img>
        <img id="car" src="Lab 3-car.png" alt="Car Image"></img>
    </div>

    <div id="controls">
        <button id="actionButton" class="button" onclick="moveCar()">Start</button>
        <button id="actionButton2" class="button2" onclick="stopCar()">Brake</button>
    </div>
    <div id="feedback"></div>
    <div id="summary">
        <h2>Results</h2>
        <div>The current traffic signal is under the <b>INCONSISTENCY</b> condition.</div>
        <div id="summaryfeedback"></div>
        <p id="summaryText"></p>
        <p id="playCountText"></p> <!-- Display play count -->
        <button onclick="resetGame()" class="button">Play Again</button>

        <div class="dialog" style="display: none;">
            <div class="messagebox"></div>
        </div>

        <script>
            let currentLightIndex = 0;
            const lightSequence = ['red', 'green', 'red', 'green', 'green', 'red', 'green', 'red', 'red', 'green'];
            const trafficLight = document.getElementById('traffic-light');
            const car = document.getElementById('car');
            const count = document.getElementById('countdown');
            const roundno = document.getElementById('roundno');
            let carPosition = 1;
            let countdownTimer;
            let timerValue = 3; // User response time
            let lightChangeTimerValue = 6; // Traffic light change time
            let correctClicks = 0; // To track correct clicks
            let lightChangeCount = 0; // To track light changes
            let playCount = 0; // Counter for number of plays

            function startGame() {
                playCount++; // Increment play count
                document.getElementById('startScreen').style.display = 'none'; // Hide the start screen
                document.getElementById('game-container').style.display = 'block'; // Show game container
                document.getElementById('controls').style.display = 'block'; // Show controls
                document.getElementById('rule1').style.display = 'block';
                document.getElementById('rule2').style.display = 'block';
                updateTrafficLight(); // Start the game
            }

            function updateTrafficLight() {
                if (lightChangeCount >= 10) { // Adjust to your maxMoves if needed
                    showSummary();
                    return;
                }

                const currentLight = lightSequence[currentLightIndex];
                trafficLight.className = currentLight;
                trafficLight.textContent = currentLight === 'red' ? 'GO' : 'STOP';

                // Reset timer value for the next light change
                timerValue = 3; // Keep user response time at 2 seconds
                count.textContent = timerValue;

                // Start the response countdown
                clearInterval(countdownTimer);
                countdownTimer = setInterval(() => {
                    timerValue--;
                    count.textContent = timerValue;

                    if (timerValue <= 0) {
                        clearInterval(countdownTimer);
                        document.getElementById('feedback').textContent = ""; // Clear feedback message
                        // Hide both action buttons when time is up
                        document.getElementById('actionButton').style.display = 'none';
                        document.getElementById('actionButton2').style.display = 'none';
                    }
                }, 1000);

                // Show buttons for the current light
                document.getElementById('actionButton').style.display = 'inline-block';
                document.getElementById('actionButton2').style.display = 'inline-block';

                currentLightIndex = (currentLightIndex + 1) % lightSequence.length;
                lightChangeCount++;
                roundno.textContent = lightChangeCount;

                // Change light every 4 seconds
                setTimeout(updateTrafficLight, lightChangeTimerValue * 1000);
            }

            let roundDetails = []; // Array to store details of each round

            function moveCar() {
                const currentLight = lightSequence[(currentLightIndex === 0 ? lightSequence.length : currentLightIndex) - 1];
                let userResponse = 'GO';
                let isCorrect = false;

                if (currentLight === 'red') {
                    correctClicks++;
                    carPosition += 70;
                    car.style.right = `${carPosition}px`;
                    document.getElementById('feedback').textContent = "Correct! You moved the car.";
                    isCorrect = true;
                } else {
                    document.getElementById('feedback').textContent = "Incorrect! You shouldn't move now.";
                }

                roundDetails.push({
                    light: currentLight,
                    userResponse: userResponse,
                    correct: isCorrect,
                    responseTime: (timerValue <= 0 ? 6 : (3 - timerValue)) // Store exact response time
                });

                // Hide buttons after clicking
                document.getElementById('actionButton').style.display = 'none';
                document.getElementById('actionButton2').style.display = 'none';

                if (carPosition >= 401 || lightChangeCount >= 10) {
                    showSummary();
                }
            }

            function stopCar() {
                const currentLight = lightSequence[(currentLightIndex === 0 ? lightSequence.length : currentLightIndex) - 1];
                let userResponse = 'STOP';
                let isCorrect = false;

                if (currentLight === 'green') {
                    correctClicks++;
                    document.getElementById('feedback').textContent = "Correct! You stopped the car.";
                    isCorrect = true;
                } else {
                    document.getElementById('feedback').textContent = "Incorrect! You shouldn't stop now.";
                }

                roundDetails.push({
                    light: currentLight,
                    userResponse: userResponse,
                    correct: isCorrect,
                    responseTime: (timerValue <= 0 ? 6 : (3 - timerValue)) // Store exact response time
                });

                // Hide buttons after clicking
                document.getElementById('actionButton').style.display = 'none';
                document.getElementById('actionButton2').style.display = 'none';

                if (lightChangeCount >= 10) {
                    showSummary();
                }
            }

            function showSummary() {
                clearInterval(countdownTimer);

                const accuracy = lightChangeCount > 0 ? ((correctClicks / lightChangeCount) * 100).toFixed(2) : 0;


                let summaryText = `You made ${correctClicks} correct moves out of ${lightChangeCount}. Accuracy: ${accuracy}%`;

                document.getElementById('summaryfeedback').textContent = summaryText;

                let tableHTML = `
        <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
            <thead>
                <tr>
                    <th style="border: 1px solid #333; padding: 10px;">Round</th>
                    <th style="border: 1px solid #333; padding: 10px;">Light Color</th>
                    <th style="border: 1px solid #333; padding: 10px;">User Response</th>
                    <th style="border: 1px solid #333; padding: 10px;">Correct</th>
                    <th style="border: 1px solid #333; padding: 10px;">Response Time (s)</th>
                </tr>
            </thead>
            <tbody>
    `;

                roundDetails.forEach((round, index) => {
                    tableHTML += `
            <tr>
                <td style="border: 1px solid #333; padding: 10px;">${index + 1}</td>
                <td style="border: 1px solid #333; padding: 10px;">${round.light}</td>
                <td style="border: 1px solid #333; padding: 10px;">${round.userResponse}</td>
                <td style="border: 1px solid #333; padding: 10px;">${round.correct ? 'Yes' : 'No'}</td>
                <td style="border: 1px solid #333; padding: 10px;">${round.responseTime}</td> <!-- Displaying exact time -->
            </tr>
        `;
                });

                tableHTML += `
            </tbody>
        </table>
    `;
                document.querySelector('.dialog').style.display = 'flex';
                document.getElementById('summaryText').innerHTML = tableHTML;
                document.getElementById('game-container').style.display = 'none';
                document.getElementById('controls').style.display = 'none';
                document.getElementById('summary').style.display = 'block';
                document.getElementById('rule1').style.display = 'none';
                document.getElementById('rule2').style.display = 'none';
                finishGame();
                window.top.postMessage('finish', '*');
            }

            function resetGame() {
                carPosition = 1;
                car.style.right = `${carPosition}px`;
                currentLightIndex = 0;
                correctClicks = 0;
                lightChangeCount = 0;
                roundDetails = []; // Reset round details
                document.getElementById('summary').style.display = 'none';
                document.getElementById('game-container').style.display = 'block';
                document.getElementById('controls').style.display = 'block';
                document.getElementById('feedback').textContent = ""; // Clear feedback
                document.getElementById('startScreen').style.display = 'none'; // Hide start screen on reset
                document.getElementById('rule1').style.display = 'block';
                document.getElementById('rule2').style.display = 'block';
                updateTrafficLight(); // Restart the game
            }
            //document.getElementById('finishButton').addEventListener('click', finishGame);

            function finishGame() {
                const urlParams = new URLSearchParams(window.location.search);
                const sid = urlParams.get('sid') || "00000000";

                const json_data = {
                    sid: sid,
                    labId: "lab3_incon", 
                    results: roundDetails
                };

                $.ajax({
                    type: 'POST',
                    url: '/api/save-lab',
                    data: JSON.stringify(json_data),
                    contentType: 'application/json'
                }).done(function (data) {
                    console.log('Lab 3 data saved:', data);
                });
            }

        </script>

</body>

</html>
