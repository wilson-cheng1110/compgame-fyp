<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
    <title>Weber's Law Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .shapes {
            display: flex;
            justify-content: center;
            margin-top: 220px;
        }

        .shape {
            margin-top: 35px;
            width: 100px;
            height: 100px;
            margin: 10px;
            background-color: #53c288;
            transition: transform 0.5s, filter 0.5s;
            position: relative;
        }

        .circle {
            border-radius: 50%;
        }

        .rectangle {
            border-radius: 0;
        }

        .bounce-animation {
            animation: bounce 1s infinite;
        }

        #infoContainer {
            display: none;
            /* Initially hidden */
            width: 95%;
            display: flex;
            justify-content: space-between;
            /* Aligns round and description */
            position: absolute;
            top: 10px;
            left: 20px;
            right: 20px;
        }

        #roundDisplay,
        #description {
            font-size: 20px;
            color: #262626;
        }

        #result,
        #finalResult {
            display: none;
            margin-top: 50px;
            text-align: center;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-30px);
            }

            60% {
                transform: translateY(-15px);
            }
        }

        .frame-animation {
            border: 2px solid white;
            /* Initial border color */
            animation: frameEffect 1s infinite;
            /* Infinite animation */
        }

        @keyframes frameEffect {
            0% {
                border-color: #53c288;
            }

            50% {
                border-color: green;
            }

            100% {
                border-color: #53c288;
            }
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }

        #startButton {
            display: flex;
            text-align: center;
            padding: 15px 30px;
            font-size: 20px;
            color: #262626;
            border-color: #595959;
            background-color: #ffffff;
            cursor: pointer;
            justify-self: center;
            border-radius: 50px;
            box-shadow: none;
        }

        .shapesContainer {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #LabRule h1 {
            text-align: center;
        }

        #LabRule li {
            line-height: 2;
            font-size: 20px;
        }
    </style>
</head>

<body>
    <div id="LabRule">
        <h1>Lab Rules</h1>
        <ol>
            <li>There will be 6 identical shapes arranged on the screen.</li>
            <li>One of the shapes will change uniformly over time.</li>
            <li>You are required to click on the corresponding shape as soon as possible.</li>
        </ol>
    </div>
    <div id="infoContainer">
        <div id="roundDisplay" style="display: none;">Round: <b>1 / 10</b></div>
        <div id="description" style="display: none;">Click the shape when you see the difference.</div>
    </div>
    <button id="startButton" onclick="hideLabRule();">Let's Play!</button>
    <div class="shapes" id="shapesContainer" style="display: none;"></div>
    <div id="result">
        <h2></h2>
    </div>
    <div id="finalResult"></div>

    <script>
        const totalShapes = 6;
        const shapesContainer = document.getElementById('shapesContainer');
        const resultDiv = document.getElementById('result');
        const finalResultDiv = document.getElementById('finalResult');
        const roundDisplay = document.getElementById('roundDisplay');
        const description = document.getElementById('description');
        const startButton = document.getElementById('startButton');
        const infoContainer = document.getElementById('infoContainer');
        let changingIndex, currentRound = 0;
        let startTime;
        const results = [];
        let cumulativeTime = 0; // To track cumulative time for wrong attempts

        // Define shape types for each round
        const shapeTypes = [
            { name: 'circle (larger)', type: 'circle', transformation: 'scale', target: 1.5 },
            { name: 'rectangle (smaller)', type: 'rectangle', transformation: 'scale', target: 0.5 },
            { name: 'circle (brighter)', type: 'circle', transformation: 'brightness', target: 1.5 },
            { name: 'rectangle (darker)', type: 'rectangle', transformation: 'brightness', target: 0.5 },
            { name: 'circle (bouncing)', type: 'circle', transformation: 'bounce', target: 0.005 },
            { name: 'rectangle (larger)', type: 'rectangle', transformation: 'scale', target: 1.5 },
            { name: 'circle (darker)', type: 'circle', transformation: 'brightness', target: 0.5 },
            { name: 'circle (smaller)', type: 'circle', transformation: 'scale', target: 0.5 },
            { name: 'rectangle (brighter)', type: 'rectangle', transformation: 'brightness', target: 1.5 },
            { name: 'rectangle (frame)', type: 'rectangle', transformation: 'frame', target: 0.5 }
        ];

        startButton.addEventListener('click', startGame);

        function hideLabRule() {
            document.getElementById('LabRule').style.display = 'none';
            document.getElementById('roundDisplay').style.display = 'block';
            document.getElementById('description').style.display = 'block';
        }

        function startGame() {
            startButton.style.display = 'none';
            infoContainer.style.display = 'flex'; // Show round and description
            shapesContainer.style.display = 'flex';
            createShapes();
        }

        function createShapes() {
            shapesContainer.innerHTML = '';
            for (let i = 0; i < totalShapes; i++) {
                const shape = document.createElement('div');
                shape.classList.add('shape', shapeTypes[currentRound].type);
                shape.addEventListener('click', () => shapeClicked(i));
                shapesContainer.appendChild(shape);
            }
            changingIndex = Math.floor(Math.random() * totalShapes);
            startTime = Date.now();
            roundDisplay.textContent = `Round: ${currentRound + 1} / 10`; // Update round display
            cumulativeTime = 0; // Reset cumulative time at the start of each round
            changeShape();
        }

        function changeShape() {
            const changingShape = shapesContainer.children[changingIndex];
            let scale = 1;
            let brightness = 1;
            const changeDuration = 5000; // 5 seconds
            const startChangeTime = Date.now();

            function animate() {
                const elapsed = Date.now() - startChangeTime;

                if (shapeTypes[currentRound].transformation === 'scale') {
                    scale = (shapeTypes[currentRound].target === 1.5)
                        ? 1 + (elapsed / changeDuration) * (shapeTypes[currentRound].target - 1)
                        : 1 - (elapsed / changeDuration) * (1 - shapeTypes[currentRound].target);
                    changingShape.style.transform = `scale(${scale})`;
                } else if (shapeTypes[currentRound].transformation === 'brightness') {
                    brightness = 1 + (elapsed / changeDuration) * (shapeTypes[currentRound].target - 1);
                    changingShape.style.filter = `brightness(${brightness})`;
                } else if (shapeTypes[currentRound].transformation === 'bounce') {
                    changingShape.classList.add('bounce-animation');
                } else if (shapeTypes[currentRound].transformation === 'frame') {
                    changingShape.classList.add('frame-animation');
                }

                if (elapsed < changeDuration) {
                    requestAnimationFrame(animate);
                }
            }
            animate();
        }

        function shapeClicked(index) {
            const clickTime = Date.now();
            const clickedShape = shapesContainer.children[index];
            const timeTaken = ((clickTime - startTime) / 1000).toFixed(2);
            const isCorrect = index === changingIndex;

            if (isCorrect) {
                cumulativeTime += parseFloat(timeTaken); // Add the response time
                if (results.length === currentRound) {
                    results.push({
                        shape: shapeTypes[currentRound].name,
                        time: cumulativeTime,
                        correct: true
                    });
                }

                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `Correct! Clicking time: ${cumulativeTime.toFixed(2)} seconds`;
                clickedShape.style.transform = 'scale(1)';
                clickedShape.style.backgroundColor = 'red';
                stopChanging();

                setTimeout(() => {
                    clickedShape.style.backgroundColor = '';
                    currentRound++;
                    if (currentRound < shapeTypes.length) {
                        createShapes();
                    } else {
                        displayFinalResults();
                    }
                }, 1000);
            } else {
                cumulativeTime += parseFloat(timeTaken); // Track cumulative time for wrong attempts
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `Wrong shape! Try again.`;
                clickedShape.style.backgroundColor = 'gray';
            }
        }

        function stopChanging() {
            const changingShape = shapesContainer.children[changingIndex];
            changingShape.style.transform = 'none';
            changingShape.style.filter = 'none';
            changingShape.classList.remove('bounce-animation', 'frame-animation');
        }

        function displayFinalResults() {
            shapesContainer.style.display = 'none';
            infoContainer.style.display = 'none'; // Hide the info container
            resultDiv.style.display = 'none';
            finalResultDiv.innerHTML = "<h2>Results</h2>";
            finalResultDiv.style.display = 'block';
            updateResultsTable();
            finishGame();
            window.top.postMessage('finish', '*');
        }

        function updateResultsTable() {
            const resultsTable = document.createElement('table');
            resultsTable.innerHTML = `
                <tr>
                    <th>Rounds</th>
                    <th>Attribute</th>
                    <th>Change Method</th>
                    <th>Attempts</th>
                    <th>Response time (s)</th>
                </tr>
            `;

            results.forEach((result, index) => {
                let attempts = result.correct ? 1 : 0;
                resultsTable.innerHTML += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${result.shape}</td>
                        <td>${shapeTypes[index].transformation}</td>
                        <td>${attempts}</td>
                        <td>${result.time.toFixed(2)}</td>
                    </tr>
                `;
            });

            finalResultDiv.appendChild(resultsTable);
        }

        function finishGame() {
            const urlParams = new URLSearchParams(window.location.search);
            const sid = urlParams.get('sid') || "00000000";

            const summaryData = [];
            results.forEach((result, index) => {
                let attempts = result.correct ? 1 : 0;
                summaryData.push({
                    round: `${index + 1}`,
                    attribute: `${result.shape}`,
                    change_method: `${shapeTypes[index].transformation}`,
                    attempts: `${attempts}`,
                    respond_time: `${result.time.toFixed(2)}`
                });
            });

            const json_data = {
                sid: sid,
                labId: "lab5",
                results: { experiments: summaryData }
            };

            $.ajax({
                type: 'POST',
                url: '/api/save-lab',
                data: JSON.stringify(json_data),
                contentType: 'application/json'
            }).done(function (data) {
                console.log('Lab 5 data saved:', data);
            });
        }

    </script>
</body>

</html>
