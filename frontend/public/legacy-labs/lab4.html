<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
    <title>Shape Grouping Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
            box-sizing: border-box;
        }
        .container {
            max-width: 600px;
            margin: auto;
        }
        img {
            width: 100%;
            height: auto;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .options button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .summary {
            margin-top: 20px;
            display: none;
            text-align: center;
        }
        .start-button {
            display: flex;
            text-align: center;
            padding: 15px 30px;
            font-size: 20px;
            color: #262626;
            border-color: #595959;
            background-color: #ffffff;
            cursor: pointer;
            justify-self: center;
            border-radius: 50px;
            box-shadow: none;
        }
        .button-wrapper {
            display: flex;
            justify-content: center; /* Center the button */
            margin-bottom: 20px; /* Space below the button */
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #ffffff;
        }
        td:first-child, th:first-child {
            width: 20%; /* 7 parts */
        }
        td:last-child, th:last-child {
            width: 20%; /* 3 parts */
        }
        .summary-image {
            width: 250px; /* Adjust as needed */
            height: auto;    
            display: inline-block; /* Center the image */
            margin-left: 10px; /* Space between input and image */
        }
        .teaching-image {
            width: 80px; /* Set a fixed width */
            height: 80px; /* Set a fixed height */
        }
        .dialog {
            margin-top: 20px;
            display: flex; /* Use flexbox for alignment */
            align-items: center; /* Center items vertically */
        }
        .LabRule{
            text-align: justify;
            line-height: 2;
            margin-left: 0%;
            margin-right: 0%;
            font-size: 20px;
        }
        .LabRule h1{
            text-align: center;
        }
        #counter {
            font-size: 24px;
            position: fixed;
            top: 10px;
            left: 20px; /* Adjusted for visibility */
            display: none;
        }

        #descript {
            font-size: 24px;
            position: fixed;
            top: 10px;
            right: 20px; /* Adjusted for visibility */
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="LabRule" class="LabRule">
        <h1>Lab Rules</h1>
        <ol>
            <li>Observe the shapes on the page and decide how many groups they can be divided into.</li>
            <li>Note: There are no right or wrong answers for the options.</li>
        </ol>
    </div>
    <div class="button-wrapper">
        <button id="start-button" class="start-button" onclick="hideRule()">Let's Play!</button> <!-- Start Button -->
    </div>
    <div id="quiz" style="display: none;">
        <div id="counter">Rounds: <b><span id="countround"></span> / 4</b></div>
        <div id="descript" >Decide how many groups they can be divided into.</div>
        <img id="roundImage" src="pict1.png" alt="Round 1"></img>

        
        <div class="options">
            <button onclick="submitAnswer(1)">1</button>
            <button onclick="submitAnswer(2)">2</button>
            <button onclick="submitAnswer(3)">3</button>
            <button onclick="submitAnswer(4)">4</button>
        </div>
    </div>

    <div class="summary" id="summary">
        <h2>Results</h2>
        <table>
            <thead>
                <tr>
                    <th>Round</th>
                    <th>Arrangement of shapes</th>
                    <th>Number of groups selected</th>
                </tr>
            </thead>
            <tbody id="summaryBody">
            </tbody>
        </table>
    </div>
</div>

<script>
    let currentRound = 1;
    const totalRounds = 4;
    const countround = document.getElementById('countround');

    function submitAnswer(answer) {
        const summaryBody = document.getElementById('summaryBody');
        const newRow = document.createElement('tr');
        newRow.innerHTML = `<td>${currentRound}</td>
                            <td><img class="summary-image" src="pict${currentRound}.png" alt="Round ${currentRound}"></td>
                            <td>${answer}</td>`;
        summaryBody.appendChild(newRow);
        
        currentRound++;
        if (currentRound <= totalRounds) {
            countround.textContent=currentRound;
            document.getElementById('roundImage').src = 'pict'+currentRound + '.png';
        } else {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('summary').style.display = 'block';
            document.getElementById('counter').style.display = 'none';//
            document.getElementById('descript').style.display = 'none';//
            finishGame();
            window.top.postMessage('finish', '*');
        }
    }

    function startQuiz() {
        document.getElementById('quiz').style.display = 'block'; // Show quiz
        document.getElementById('start-button').style.display = 'none'; // Hide start button
        document.getElementById('counter').style.display = 'block';//
        document.getElementById('descript').style.display = 'block';//
        document.getElementById('countround').innerText = 1;//
    }
    

    document.getElementById('start-button').addEventListener('click', startQuiz); // Event listener for start button

    function finishGame() {
        const urlParams = new URLSearchParams(window.location.search);
        const sid = urlParams.get('sid') || "00000000";

        const rows = document.querySelectorAll('#summaryBody tr');
        const summaryData = [];

        rows.forEach((row, index) => {
            const answer = row.cells[2].innerText || row.cells[2].textContent;
            summaryData.push({
                question: `Question ${index + 1}`,
                answer: answer
            });
        });

        const json_data = {
            sid: sid,
            labId: "lab4", 
            results: { answers: summaryData }
        };

        $.ajax({
            type: 'POST',
            url: '/api/save-lab',
            data: JSON.stringify(json_data),
            contentType: 'application/json'
        }).done(function (data) {
            console.log('Quiz data saved:', data);
        });
    }

    function hideRule() {
        document.getElementById('LabRule').style.display = 'none';
    }

    //document.getElementById('finishButton').addEventListener('click', finishGame);
</script>
</body>
</html>
