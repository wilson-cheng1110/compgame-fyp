<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 2 - Hick's Law</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            /* margin: 20px; */
            padding: 20px;
            background-color: #f8f9fa;
        }
        h1 {
            text-align: center;
        }

        .country-list {
            display: grid;
            grid-template-columns: repeat(8, 1fr); /* 6 columns */
            gap: 0; /* No spacing between items */
            padding: 0;
            margin: 0;
            list-style-type: none; /* Remove bullet points */
        }
        .country-list li {
            padding: 10px;
            background: #e9ecef;
            border: 1px solid #ced4da;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s;
            margin: 0; /* No margin for list items */
        }
        .country-list li:hover {
            background: #adb5bd;
        }
        #startButton {
            display: block;
            margin: 150px auto;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        h2 {
            text-align: center;
            margin: 15px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ced4da;
            text-align: center;
        }
        .result {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
        }
        #description2 {
            font-size: 16px;
            margin: 10px 0;
            text-align: center;
        }
        .dialog {
            margin-top: 20px;
            display: flex; /* Use flexbox for alignment */
            align-items: center; /* Center items vertically */
            display: none;
        }
        .messagebox {
            text-align: left; /* Align the dialog text to the left */
            background-color: #72cece; /* Blue background */
            color: white; /* Text color to ensure readability */
            padding: 10px; /* Add padding for spacing */
            border-radius: 25px; /* Rounded corners */
            width: 500px; /* Set a fixed width */
            display: none;
        }
        .teaching-image {
            width: 60px; /* Set a fixed width */
            height: 80px; /* Set a fixed height */
            display: none;
        }
        #sidInput {
            display: none; /* Initially hidden */
        }
        .bold {
            font-size: 30px;
            font-weight: bold;
        }
        span{text-align: center;}
        #startButton {
            padding: 15px 30px;
            font-size: 20px;
            color: #262626;
            background-color: #ffffff;
            cursor: pointer;
            border-radius: 50px;
        }
        #counter {
            font-size: 24px;
            position: fixed;
            top: 10px;
            left: 20px; /* Adjusted for visibility */
            display: none;
        }

        #descript {
            font-size: 24px;
            position: fixed;
            top: 10px;
            right: 20px; /* Adjusted for visibility */
            display: none;
        }
    </style>
</head>
<body>


<!-- <h1 id="description2" style="display: block;">Lab Rules</h1>
<h1 id="description3" style="display: none;">Lab 2 - Hick's Law</h1>
<br>
<h3 id="description2" style="display: block;">1. You need to find a given option as quickly as possible in different types of lists.</h3>
<br><br> -->

<div id="counter">Rounds: <b><span id="countround"></span> / 5</b></div>
<div id="descript" >This sorting methods: <b><span id="round">64 countries randomly arranged</span></b></div>
<h1 id="title">Lab Rules</h1><br>
<p id="description1" style="display: none; text-align: center; font-size: 30px;">Please find out <b>France</b> in the list.</span></p>
<p id="description2" style="display: block; text-align: left; font-size: 20px;">1. You need to find a given option as quickly as possible in different types of lists.</p>
<button class="contentbutton" id="startButton">Let's Play!</button>
<div class="list-container">
    <div id="game"></div>
    <div class="result" id="result"></div>
    <div class="messagebox"><p>Testing testing testing...</p></div>
</div> 
<img src="person.png" alt="Type here" class="teaching-image">
<div id="sidInput">
    <input type="text" id="sid" placeholder="Enter your SID" required>
    <button id="finishButton">Finish</button>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    const round = document.getElementById('round');
    const countround = document.getElementById('countround');//
    const countries = {
        NorthAmerica: ["America", "Cuba", "Haiti", "Lucia", "Canada", "Mexico", "Belize", "Panama"],
SouthAmerica: ["Peru", "Chile", "Guyana", "Brazil", "Ecuador", "Bolivia", "Uruguay", "Colombia"],
Europe: ["Spain", "Italy", "Malta", "Norway", "Sweden", "Russia", "France", "Monaco", "Poland", "Serbia", "Greece", "Iceland", "Finland", "Estonia", "Belarus","Latvia"],
Africa: ["Mali", "Togo", "Chad", "Libya", "Egypt", "Ghana", "Benin", "Gabon"],
Asia: ["Oman", "Iraq", "Iran", "Laos", "Yemen", "Qatar", "China", "India", "Nepal", "Japan", "Kuwait", "Jordan", "Israel", "Bhutan","Syria","Cyprus"],
Oceania: ["Fiji", "Palau", "Nauru", "Tonga", "Samoa", "Tuvalu", "Australia", "Vanuatu"]
    };
    const countries2 = {
        NorthAmerica: ["America", "Cuba", "Haiti", "Lucia", "Canada", "Mexico", "Belize", "Panama"],
SouthAmerica: ["Peru", "Chile", "Guyana", "Brazil", "Ecuador", "Bolivia", "Uruguay", "Colombia"],
Europe: ["Spain", "Italy", "Malta", "Norway", "Sweden", "Russia", "Monaco", "Poland", "Serbia", "Greece", "Iceland", "Finland", "Estonia", "Belarus","Latvia"],
Africa: ["Mali", "Togo", "Chad", "Libya", "Egypt", "Ghana", "Benin", "Gabon"],
Asia: ["Oman", "Iraq", "Iran", "Laos", "Yemen", "Qatar", "China", "India", "Nepal", "Japan", "Kuwait", "Jordan", "Israel", "Bhutan","Syria","Cyprus"],
Oceania: ["Fiji", "Palau", "Nauru", "Tonga", "Samoa", "Tuvalu", "Australia", "Vanuatu"]
    };
    const shuffle = (array) => array.sort(() => Math.random() - 0.5);
    
    const createList = (countries) => {
        const ul = document.createElement('ul');
        ul.className = 'country-list';
        countries.forEach(country => {
            const li = document.createElement('li');
            li.textContent = country;
            li.onclick = () => handleSelect(country);
            ul.appendChild(li);
        });
        return ul;
    };

    const handleSelect = (selectedCountry) => {
        totalAttempts++;
        if (selectedCountry === "France") {
            correctSelections++;
            const endTime = performance.now();
            const timeTaken = ((endTime - startTime) / 1000).toFixed(4); // Convert to seconds
            const accuracy = ((correctSelections / totalAttempts) * 100).toFixed(2);
            roundResults.push({
                round: currentList + 1,
                format: roundFormats[currentList],
                timeTaken,
                accuracy
            });
            currentList++;
            correctSelections = 0;
            totalAttempts = 0;
            if (currentList < listFormats.length) {
                countround.textContent=currentList+1;//
                round.textContent=roundFormats[currentList];
                loadNextList();
            } else {
                displayResults();
            }
        }
    };

    const displayResults = () => {
        const resultDiv = document.getElementById('result');
        const table = document.createElement('table');
        table.innerHTML = `
            <tr>
                <th>Rounds</th>
                <th>Sorting Method</th>
                <th>Response time (s)</th>
                <th>Accuracy</th>
            </tr>
        `;
        roundResults.forEach(result => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>Round ${result.round}</td>
                <td>${result.format}</td>
                <td>${result.timeTaken}s</td>
                <td>${result.accuracy}%</td>
            `;
            table.appendChild(row);
        });
        resultDiv.appendChild(table);
        document.getElementById('game').innerHTML = '';

        // Show the input, dialog, message, and teaching image after displaying results
        document.getElementById('sidInput').style.display = 'none';
        document.querySelector('.messagebox').style.display = 'none';
        document.querySelector('.teaching-image').style.display = 'none';
        document.getElementById('description1').style.display = 'none';

        document.getElementById('title').style.display = 'block';
        document.getElementById('title').textContent = "Results";
        document.getElementById('counter').style.display = 'none';//
        document.getElementById('descript').style.display = 'none';//
        finishGame();
        window.top.postMessage('finish', '*');
    };

    const loadNextList = () => {
        const gameDiv = document.getElementById('game');
        gameDiv.innerHTML = '';

        if (currentList === listFormats.length - 1) {
            const continents = Object.keys(countries);
            continents.forEach(continent => {
                const continentHeader = document.createElement('h2');
                continentHeader.textContent = continent;
                gameDiv.appendChild(continentHeader);
                gameDiv.appendChild(createList(countries[continent]));
            });
        } else {
            gameDiv.appendChild(createList(listFormats[currentList]));
        }
        
        startTime = performance.now();
    };

    const startGame = () => {
        // document.getElementById('startButton').style.display = 'none';
        // document.getElementById('description').style.display = 'block';
        // document.getElementById('description1').style.display = 'none';
        // document.getElementById('description3').style.display = 'block';
        // document.getElementById('description2').style.display = 'none'; // Hide start button
        // loadNextList();
        document.getElementById('startButton').style.display = 'none'; // Hide start button
        document.getElementById('countround').innerText = 1;//
        document.getElementById('description2').style.display = 'none';
        document.getElementById('description1').style.display = 'block';
        document.getElementById('title').style.display = 'none';
        document.getElementById('counter').style.display = 'block';//
        document.getElementById('descript').style.display = 'block';//
        loadNextList();
    };


    let startTime;
    const roundResults = [];
    let correctSelections = 0;
    let totalAttempts = 0;
    
    const listFormats = [
        shuffle([...Object.values(countries2).flat(), "France"]),
        shuffle([...Object.values(countries2).flat().slice(0, 31), "France"]),
        shuffle([...Object.values(countries2).flat().slice(0, 15), "France"]),
        [...Object.values(countries2).flat(), "France"].sort(),
        []
    ];
    
    const roundFormats = [
        "64 countries randomly arranged",
        "32 countries randomly arranged",
        "16 countries randomly arranged",
        "64 countries arranged alphabetically",
        "64 countries arranged by continent"
    ];
    
    let currentList = 0;
    document.getElementById('startButton').onclick = startGame; // Start the game when button is clicked
    //document.getElementById('finishButton').addEventListener('click', finishGame);

    function finishGame() {
        const urlParams = new URLSearchParams(window.location.search);
        const sid = urlParams.get('sid') || "00000000";

        const json_data = {
            sid: sid,
            labId: "lab2",
            results: {
                format: result.format, 
                userResponse: result.timeTaken, 
                correct: result.accuracy 
            }
        };

        $.ajax({
            type: 'POST',
            url: '/api/save-lab',
            data: JSON.stringify(json_data),
            contentType: 'application/json'
        }).done(function (data) {
            console.log('Lab 2 data saved:', data);
        });
    }
</script>

</body>
</html>
